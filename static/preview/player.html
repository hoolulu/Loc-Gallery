    .player-mock {
      position: relative;
      display: flex;
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      min-height: 12rem;
      overflow: hidden;
      background: #000;
      border-radius: 0.25rem;
    }
    .player-mock-frame {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .player-mock-controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.45rem 0.75rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.82));
      color: #f4f4f5;
      font: 12px/1.2 system-ui, sans-serif;
    }
    .player-mock-btn {
      width: 1.5rem;
      height: 1.5rem;
      border: 0;
      border-radius: 0.25rem;
      background: transparent;
      color: inherit;
      font-size: 0.95rem;
      cursor: default;
    }
    .player-mock-progress {
      flex: 1;
      height: 0.28rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
      overflow: hidden;
    }
    .player-mock-progress > span {
      display: block;
      width: 28%;
      height: 100%;
      background: #e50914;
      border-radius: inherit;
    }
    .player-mock-time { opacity: 0.9; white-space: nowrap; }
    .player-mock-icon { opacity: 0.85; font-size: 0.9rem; }
  </style>
